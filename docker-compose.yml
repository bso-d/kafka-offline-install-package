      test: ["CMD", "cub", "kafka-ready", "1", "10", "-b", "localhost:9099"]
      interval: 10s
      timeout: 15s
      retries: 5
      start_period: 45s

  # ─── Schema Registry (cluster-1) ─────────────────────────────────────────────
  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    hostname: schema-registry
    container_name: shoji-schema-registry
    restart: unless-stopped
    depends_on:
      kafka-92:
        condition: service_healthy
      kafka-93:
        condition: service_healthy
      kafka-94:
        condition: service_healthy
      kafka-95:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: "kafka-92:9092,kafka-93:9093,kafka-94:9094,kafka-95:9095"
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    networks:
      - kafka-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/subjects > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Kafbat UI (both clusters) ───────────────────────────────────────────────
  kafka-ui:
    image: kafbat/kafka-ui:latest
    hostname: kafka-ui
    container_name: shoji-kafbat-ui
    restart: unless-stopped
    depends_on:
      kafka-92:
        condition: service_healthy
      kafka-93:
        condition: service_healthy
      kafka-94:
        condition: service_healthy
      kafka-95:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
    ports:
      - "8080:8080"
    environment:
      AUTH_TYPE: "LOGIN_FORM"
      SPRING_SECURITY_USER_NAME: ${KAFKA_UI_USER}
      SPRING_SECURITY_USER_PASSWORD: ${KAFKA_UI_PASSWORD}
      KAFKA_CLUSTERS_0_NAME: cluster-1
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka-92:9092,kafka-93:9093,kafka-94:9094,kafka-95:9095"
      KAFKA_CLUSTERS_0_ZOOKEEPER: "zookeeper:2181"
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: "http://schema-registry:8081"
      KAFKA_CLUSTERS_0_READONLY: "false"
      KAFKA_CLUSTERS_1_NAME: cluster-2
      KAFKA_CLUSTERS_1_BOOTSTRAPSERVERS: "kafka-96:9096,kafka-97:9097,kafka-98:9098,kafka-99:9099"
      KAFKA_CLUSTERS_1_READONLY: "false"
    networks:
      - kafka-network
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ─── Nginx Proxy ─────────────────────────────────────────────────────────────
  proxy:
    image: nginx:1.27-alpine
    container_name: shoji-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      kafka-ui:
        condition: service_healthy
    networks:
      - kafka-network

# ─── Named Volumes ─────────────────────────────────────────────────────────────
volumes:
  zookeeper-data:
  zookeeper-log:
  kafka-92-data:
  kafka-93-data:
  kafka-94-data:
  kafka-95-data:
  kafka-96-data:
  kafka-97-data:
  kafka-98-data:
  kafka-99-data:

# ─── Networks ──────────────────────────────────────────────────────────────────
networks:
  kafka-network:
    driver: bridge

      - "19097:19097"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181/cluster2"
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9097,EXTERNAL://0.0.0.0:19097

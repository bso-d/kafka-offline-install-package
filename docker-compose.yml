      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9099,EXTERNAL://0.0.0.0:19099
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-99:9099,EXTERNAL://localhost:19099
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTPS — terminates TLS, proxies to Kafbat
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Security headers ───────────────────────────────────────────────────────
    # (No HSTS by default: with a self-signed cert it pins browsers to HTTPS and
    #  makes a later cert mismatch/rotation a non-bypassable error. Add it only
    #  once a trusted/org-CA cert is in place.)
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' ws: wss:;"
        always;
    add_header Permissions-Policy
        "camera=(), microphone=(), geolocation=(), payment=()"
        always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header X-Frame-Options            "SAMEORIGIN"    always;
    add_header X-Content-Type-Options     "nosniff"       always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;

    # ── Proxy to Kafbat ────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://kafka-ui:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 3600s;
    }
}
